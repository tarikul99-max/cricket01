<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>♟️ চেস টুর্নামেন্ট সিস্টেম</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: white;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* ===== হেডার ===== */
        .header {
            text-align: center;
            padding: 30px 0;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }

        .header h1 {
            font-size: 3em;
            font-weight: 300;
            letter-spacing: 3px;
            background: linear-gradient(45deg, #f7971e, #ffd200);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            opacity: 0.7;
            margin-top: 10px;
        }

        /* ===== টুর্নামেন্ট সেটআপ ===== */
        .setup-section {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .setup-section h2 {
            margin-bottom: 20px;
            font-weight: 300;
            letter-spacing: 2px;
        }

        .input-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .input-group input {
            flex: 1;
            min-width: 200px;
            padding: 12px 20px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            color: white;
            font-size: 16px;
            transition: all 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #f7971e;
            background: rgba(255, 255, 255, 0.1);
        }

        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: linear-gradient(45deg, #f7971e, #ffd200);
            color: #1a1a2e;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(247, 151, 30, 0.3);
        }

        .btn-danger {
            background: linear-gradient(45deg, #eb3349, #f45c43);
            color: white;
        }

        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(235, 51, 73, 0.3);
        }

        .btn-success {
            background: linear-gradient(45deg, #00b894, #00cec9);
            color: white;
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 206, 201, 0.3);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        /* ===== টিম লিস্ট ===== */
        .teams-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .team-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
        }

        .team-card:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .team-card .team-name {
            font-size: 18px;
            font-weight: 500;
        }

        .team-card .team-remove {
            background: rgba(235, 51, 73, 0.3);
            border: none;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.3s;
        }

        .team-card .team-remove:hover {
            background: rgba(235, 51, 73, 0.8);
            transform: scale(1.1);
        }

        /* ===== টুর্নামেন্ট ব্র্যাকেট ===== */
        .tournament-section {
            display: none;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .tournament-section.active {
            display: block;
        }

        .match-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .match-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 20px;
            transition: all 0.3s;
        }

        .match-card:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .match-card .match-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .match-card .match-round {
            font-size: 14px;
            opacity: 0.6;
            font-weight: 300;
        }

        .match-card .match-status {
            font-size: 14px;
            padding: 4px 12px;
            border-radius: 20px;
            background: rgba(0, 206, 201, 0.2);
            color: #00cec9;
        }

        .match-card .match-status.completed {
            background: rgba(0, 184, 148, 0.2);
            color: #00b894;
        }

        .match-card .match-players {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 15px 0;
        }

        .match-card .player {
            font-size: 18px;
            font-weight: 500;
            padding: 8px 15px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            flex: 1;
            text-align: center;
        }

        .match-card .player.winner {
            background: rgba(0, 184, 148, 0.2);
            border: 2px solid #00b894;
        }

        .match-card .vs {
            padding: 0 15px;
            opacity: 0.4;
            font-weight: 300;
        }

        .match-card .match-score {
            text-align: center;
            font-size: 14px;
            opacity: 0.6;
            margin-top: 10px;
        }

        .match-card .match-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            justify-content: center;
        }

        .match-card .match-actions .btn {
            padding: 8px 20px;
            font-size: 14px;
        }

        /* ===== চেস বোর্ড (ম্যাচ ভিউ) ===== */
        .board-container {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .board-container.active {
            display: flex;
        }

        .board-wrapper {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 30px;
            max-width: 600px;
            width: 100%;
        }

        .board-wrapper h3 {
            text-align: center;
            margin-bottom: 20px;
            font-weight: 300;
        }

        .board-wrapper .close-board {
            float: right;
            background: rgba(235, 51, 73, 0.3);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .board-wrapper .close-board:hover {
            background: rgba(235, 51, 73, 0.8);
        }

        .chess-board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            aspect-ratio: 1;
            border: 3px solid #2c3e50;
            border-radius: 8px;
            overflow: hidden;
            margin: 20px 0;
        }

        .chess-square {
            aspect-ratio: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.5em;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }

        .chess-square.light {
            background: #f0d9b5;
        }

        .chess-square.dark {
            background: #b58863;
        }

        .chess-square.selected {
            background: #7fc97f !important;
            box-shadow: inset 0 0 20px rgba(0, 255, 0, 0.5);
        }

        .chess-square.legal-move {
            background: rgba(0, 255, 0, 0.3) !important;
        }

        .chess-square .piece-white {
            color: #fff;
            text-shadow: 0 2px 6px rgba(0, 0, 0, 0.8);
        }

        .chess-square .piece-black {
            color: #000;
            text-shadow: 0 2px 6px rgba(255, 255, 255, 0.3);
        }

        .board-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
        }

        /* ===== রেসপন্সিভ ===== */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 2em;
            }

            .match-grid {
                grid-template-columns: 1fr;
            }

            .input-group {
                flex-direction: column;
            }

            .input-group input {
                min-width: 100%;
            }

            .chess-square {
                font-size: 1.8em;
            }

            .board-wrapper {
                padding: 15px;
            }
        }

        /* ===== অ্যানিমেশন ===== */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .match-card {
            animation: fadeIn 0.5s ease;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ===== হেডার ===== -->
        <div class="header">
            <h1>♟️ চেস টুর্নামেন্ট</h1>
            <p>টিম তৈরি করুন, ম্যাচ খেলুন, চ্যাম্পিয়ন হন!</p>
        </div>

        <!-- ===== সেটআপ সেকশন ===== -->
        <div class="setup-section" id="setupSection">
            <h2>🏆 টুর্নামেন্ট সেটআপ</h2>
            <div class="input-group">
                <input type="text" id="teamNameInput" placeholder="টিমের নাম লিখুন (যেমন: দাবা সেনা)" />
                <button class="btn btn-primary" onclick="addTeam()">➕ টিম যোগ করুন</button>
                <button class="btn btn-success" onclick="startTournament()" id="startBtn" disabled>
                    🚀 টুর্নামেন্ট শুরু করুন
                </button>
                <button class="btn btn-danger" onclick="resetAll()">🔄 রিসেট</button>
            </div>
            <div id="teamsList" class="teams-grid"></div>
            <div style="margin-top: 15px; opacity: 0.6; font-size: 14px;">
                কমপক্ষে <strong>৪</strong> টি টিম প্রয়োজন (জোড় সংখ্যা)
            </div>
        </div>

        <!-- ===== টুর্নামেন্ট ব্র্যাকেট ===== -->
        <div class="tournament-section" id="tournamentSection">
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;">
                <h2>🎯 টুর্নামেন্ট ব্র্যাকেট</h2>
                <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                    <span style="opacity: 0.6;" id="roundInfo">রাউন্ড: ১</span>
                    <button class="btn btn-secondary" onclick="showStandings()">📊 পয়েন্ট তালিকা</button>
                </div>
            </div>
            <div id="matchesContainer" class="match-grid"></div>
            <div style="margin-top: 30px; text-align: center;">
                <button class="btn btn-primary" onclick="nextRound()" id="nextRoundBtn">➡️ পরবর্তী রাউন্ড</button>
                <button class="btn btn-danger" onclick="endTournament()" style="margin-left: 10px;">⏹️ টুর্নামেন্ট শেষ করুন</button>
            </div>
        </div>

        <!-- ===== চেস বোর্ড (পপআপ) ===== -->
        <div class="board-container" id="boardContainer">
            <div class="board-wrapper">
                <button class="close-board" onclick="closeBoard()">✕</button>
                <h3 id="boardTitle">খেলা চলছে...</h3>
                <div class="chess-board" id="chessBoard"></div>
                <div class="board-info">
                    <span id="boardTurn">⚪ সাদা</span>
                    <span id="boardStatus"></span>
                    <button class="btn btn-secondary" onclick="resignMatch()" id="resignBtn">🏳️ হার মানছি</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // =====================================================
        // ===== চেস ইঞ্জিন (সরলীকৃত) =====
        // =====================================================
        const COLORS = { WHITE: 'white', BLACK: 'black' };

        class ChessGame {
            constructor() {
                this.board = [];
                this.currentTurn = COLORS.WHITE;
                this.moveHistory = [];
                this.gameOver = false;
                this.initBoard();
            }

            initBoard() {
                this.board = Array(8).fill(null).map(() => Array(8).fill(null));
                for (let c = 0; c < 8; c++) {
                    this.board[1][c] = { type: 'pawn', color: COLORS.BLACK };
                    this.board[6][c] = { type: 'pawn', color: COLORS.WHITE };
                }
                const backRank = ['rook', 'knight', 'bishop', 'queen', 'king', 'bishop', 'knight', 'rook'];
                for (let c = 0; c < 8; c++) {
                    this.board[0][c] = { type: backRank[c], color: COLORS.BLACK };
                    this.board[7][c] = { type: backRank[c], color: COLORS.WHITE };
                }
            }

            getPiece(row, col) {
                if (row < 0 || row > 7 || col < 0 || col > 7) return null;
                return this.board[row][col];
            }

            isInBounds(row, col) {
                return row >= 0 && row < 8 && col >= 0 && col < 8;
            }

            isPathClear(fromRow, fromCol, toRow, toCol) {
                const rowStep = Math.sign(toRow - fromRow);
                const colStep = Math.sign(toCol - fromCol);
                let row = fromRow + rowStep;
                let col = fromCol + colStep;
                while (row !== toRow || col !== toCol) {
                    if (this.board[row][col] !== null) return false;
                    row += rowStep;
                    col += colStep;
                }
                return true;
            }

            isValidMovePattern(fromRow, fromCol, toRow, toCol) {
                if (!this.isInBounds(fromRow, fromCol) || !this.isInBounds(toRow, toCol)) return false;
                const piece = this.board[fromRow][fromCol];
                if (!piece) return false;
                const target = this.board[toRow][toCol];
                if (target && target.color === piece.color) return false;
                const dr = toRow - fromRow;
                const dc = toCol - fromCol;
                const absDr = Math.abs(dr);
                const absDc = Math.abs(dc);

                switch (piece.type) {
                    case 'pawn': {
                        const direction = piece.color === COLORS.WHITE ? -1 : 1;
                        const startRow = piece.color === COLORS.WHITE ? 6 : 1;
                        if (dc === 0 && !target) {
                            if (dr === direction) return true;
                            if (fromRow === startRow && dr === 2 * direction && this.isPathClear(fromRow, fromCol, toRow,
                                    toCol)) return true;
                        }
                        if (absDc === 1 && dr === direction && target) return true;
                        return false;
                    }
                    case 'knight':
                        return (absDr === 2 && absDc === 1) || (absDr === 1 && absDc === 2);
                    case 'bishop':
                        return absDr === absDc && this.isPathClear(fromRow, fromCol, toRow, toCol);
                    case 'rook':
                        return (fromRow === toRow || fromCol === toCol) && this.isPathClear(fromRow, fromCol, toRow, toCol);
                    case 'queen':
                        return (absDr === absDc || fromRow === toRow || fromCol === toCol) && this.isPathClear(fromRow,
                            fromCol, toRow, toCol);
                    case 'king':
                        return absDr <= 1 && absDc <= 1 && (absDr + absDc > 0);
                    default:
                        return false;
                }
            }

            isSquareAttacked(row, col, attackerColor) {
                for (let r = 0; r < 8; r++) {
                    for (let c = 0; c < 8; c++) {
                        const piece = this.board[r][c];
                        if (!piece || piece.color !== attackerColor) continue;
                        if (piece.type === 'king') {
                            if (Math.abs(r - row) <= 1 && Math.abs(c - col) <= 1) return true;
                            continue;
                        }
                        if (this.isValidMovePattern(r, c, row, col)) return true;
                    }
                }
                return false;
            }

            findKing(color) {
                for (let r = 0; r < 8; r++) {
                    for (let c = 0; c < 8; c++) {
                        const piece = this.board[r][c];
                        if (piece && piece.type === 'king' && piece.color === color) {
                            return { row: r, col: c };
                        }
                    }
                }
                return null;
            }

            isKingInCheck(color) {
                const king = this.findKing(color);
                if (!king) return false;
                const enemy = color === COLORS.WHITE ? COLORS.BLACK : COLORS.WHITE;
                return this.isSquareAttacked(king.row, king.col, enemy);
            }

            getPseudoLegalMoves(color) {
                const moves = [];
                for (let r = 0; r < 8; r++) {
                    for (let c = 0; c < 8; c++) {
                        const piece = this.board[r][c];
                        if (!piece || piece.color !== color) continue;
                        for (let tr = 0; tr < 8; tr++) {
                            for (let tc = 0; tc < 8; tc++) {
                                if (this.isValidMovePattern(r, c, tr, tc)) {
                                    moves.push({ fromRow: r, fromCol: c, toRow: tr, toCol: tc });
                                }
                            }
                        }
                    }
                }
                return moves;
            }

            getLegalMoves(color) {
                const legal = [];
                const pseudo = this.getPseudoLegalMoves(color);
                for (const move of pseudo) {
                    const backup = this.board[move.toRow][move.toCol];
                    const movedPiece = this.board[move.fromRow][move.fromCol];
                    this.board[move.toRow][move.toCol] = movedPiece;
                    this.board[move.fromRow][move.fromCol] = null;
                    if (!this.isKingInCheck(color)) {
                        legal.push(move);
                    }
                    this.board[move.fromRow][move.fromCol] = movedPiece;
                    this.board[move.toRow][move.toCol] = backup;
                }
                return legal;
            }

            makeMove(move) {
                const piece = this.board[move.fromRow][move.fromCol];
                this.board[move.toRow][move.toCol] = piece;
                this.board[move.fromRow][move.fromCol] = null;
                this.currentTurn = this.currentTurn === COLORS.WHITE ? COLORS.BLACK : COLORS.WHITE;
                this.moveHistory.push(move);
            }

            isCheckmate(color) {
                return this.getLegalMoves(color).length === 0 && this.isKingInCheck(color);
            }

            isStalemate(color) {
                return this.getLegalMoves(color).length === 0 && !this.isKingInCheck(color);
            }

            clone() {
                const newGame = new ChessGame();
                newGame.board = this.board.map(row => row.map(cell => cell ? { ...cell } : null));
                newGame.currentTurn = this.currentTurn;
                newGame.moveHistory = [...this.moveHistory];
                newGame.gameOver = this.gameOver;
                return newGame;
            }
        }

        // =====================================================
        // ===== টুর্নামেন্ট ম্যানেজার =====
        // =====================================================
        let teams = [];
        let tournamentStarted = false;
        let currentRound = 0;
        let matches = [];
        let matchResults = [];
        let currentMatchIndex = -1;
        let currentGame = null;
        let selectedSquare = null;
        let legalMoves = [];
        let currentMatchData = null;

        const UNICODE_PIECES = {
            'white': { 'king': '♔', 'queen': '♕', 'rook': '♖', 'bishop': '♗', 'knight': '♘', 'pawn': '♙' },
            'black': { 'king': '♚', 'queen': '♛', 'rook': '♜', 'bishop': '♝', 'knight': '♞', 'pawn': '♟' }
        };

        // ===== টিম ম্যানেজমেন্ট =====
        function addTeam() {
            const input = document.getElementById('teamNameInput');
            const name = input.value.trim();
            if (!name) {
                alert('দয়া করে একটি টিমের নাম লিখুন!');
                return;
            }
            if (teams.find(t => t.toLowerCase() === name.toLowerCase())) {
                alert('এই নামে একটি টিম ইতিমধ্যে আছে!');
                return;
            }
            teams.push(name);
            input.value = '';
            renderTeams();
            updateStartButton();
        }

        function removeTeam(index) {
            if (tournamentStarted) {
                alert('টুর্নামেন্ট শুরু হয়ে গেছে! টিম মুছতে পারবেন না।');
                return;
            }
            teams.splice(index, 1);
            renderTeams();
            updateStartButton();
        }

        function renderTeams() {
            const container = document.getElementById('teamsList');
            if (teams.length === 0) {
                container.innerHTML = '<div style="opacity:0.4; padding:20px; text-align:center;">কোনো টিম যোগ করা হয়নি</div>';
                return;
            }
            container.innerHTML = teams.map((name, i) => `
                <div class="team-card">
                    <span class="team-name">🏁 ${name}</span>
                    <button class="team-remove" onclick="removeTeam(${i})">✕</button>
                </div>
            `).join('');
        }

        function updateStartButton() {
            const btn = document.getElementById('startBtn');
            btn.disabled = teams.length < 4 || teams.length % 2 !== 0;
            if (teams.length >= 4 && teams.length % 2 === 0) {
                btn.textContent = `🚀 টুর্নামেন্ট শুরু করুন (${teams.length} টি টিম)`;
            } else {
                btn.textContent = `🚀 টুর্নামেন্ট শুরু করুন (${teams.length}/${teams.length % 2 === 0 ? 4 : 'জোড় সংখ্যা'} টিম)`;
            }
        }

        function resetAll() {
            if (confirm('সব ডাটা রিসেট করতে চান?')) {
                teams = [];
                tournamentStarted = false;
                currentRound = 0;
                matches = [];
                matchResults = [];
                document.getElementById('tournamentSection').classList.remove('active');
                renderTeams();
                updateStartButton();
                closeBoard();
            }
        }

        // ===== টুর্নামেন্ট শুরু =====
        function startTournament() {
            if (teams.length < 4 || teams.length % 2 !== 0) {
                alert('কমপক্ষে ৪ টি জোড় সংখ্যক টিম প্রয়োজন!');
                return;
            }
            tournamentStarted = true;
            currentRound = 1;
            document.getElementById('setupSection').style.display = 'none';
            document.getElementById('tournamentSection').classList.add('active');
            generateRound();
        }

        function generateRound() {
            // রাউন্ড রবিন - প্রতিটি রাউন্ডে সব টিম খেলে
            const shuffled = [...teams];
            // রোটেশন অ্যালগরিদম
            if (currentRound === 1) {
                // প্রথম রাউন্ড: র‍্যান্ডম পেয়ারিং
                for (let i = shuffled.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
                }
            } else {
                // পরবর্তী রাউন্ড: রোটেশন
                const first = shuffled[0];
                const rest = shuffled.slice(1);
                const rotated = [first, ...rest.slice(1), rest[0]];
                // এখানে আরও উন্নত অ্যালগরিদম ব্যবহার করা যেতে পারে
                // সহজতার জন্য র‍্যান্ডম করছি
                for (let i = shuffled.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
                }
            }

            // পেয়ারিং তৈরি
            const pairs = [];
            for (let i = 0; i < shuffled.length; i += 2) {
                if (i + 1 < shuffled.length) {
                    // এলোমেলোভাবে সাদা/কালো নির্ধারণ
                    if (Math.random() > 0.5) {
                        pairs.push([shuffled[i], shuffled[i + 1]]);
                    } else {
                        pairs.push([shuffled[i + 1], shuffled[i]]);
                    }
                }
            }

            matches = pairs.map((pair, idx) => ({
                id: `m${currentRound}-${idx}`,
                round: currentRound,
                player1: pair[0],
                player2: pair[1],
                status: 'pending', // pending, ongoing, completed
                winner: null,
                score: null,
                gameState: null
            }));

            matchResults = [];
            renderMatches();
            updateRoundInfo();
        }

        function renderMatches() {
            const container = document.getElementById('matchesContainer');
            if (matches.length === 0) {
                container.innerHTML = '<div style="opacity:0.4; padding:40px; text-align:center;">কোনো ম্যাচ নেই</div>';
                return;
            }

            container.innerHTML = matches.map((match, idx) => `
                <div class="match-card">
                    <div class="match-header">
                        <span class="match-round">🏅 রাউন্ড ${match.round}</span>
                        <span class="match-status ${match.status === 'completed' ? 'completed' : ''}">
                            ${match.status === 'pending' ? '⏳ অপেক্ষমান' : 
                              match.status === 'ongoing' ? '🎮 চলছে' : '✅ শেষ'}
                        </span>
                    </div>
                    <div class="match-players">
                        <div class="player ${match.winner === match.player1 ? 'winner' : ''}">
                            ⚪ ${match.player1}
                        </div>
                        <div class="vs">VS</div>
                        <div class="player ${match.winner === match.player2 ? 'winner' : ''}">
                            ⚫ ${match.player2}
                        </div>
                    </div>
                    ${match.score ? `<div class="match-score">${match.score}</div>` : ''}
                    <div class="match-actions">
                        ${match.status === 'pending' ? 
                            `<button class="btn btn-success" onclick="startMatch(${idx})">🎮 খেলা শুরু</button>` : 
                            match.status === 'ongoing' ? 
                            `<button class="btn btn-primary" onclick="resumeMatch(${idx})">▶️ চালিয়ে যান</button>` :
                            `<span style="opacity:0.4;">✅ সম্পূর্ণ</span>`
                        }
                    </div>
                </div>
            `).join('');
        }

        function updateRoundInfo() {
            document.getElementById('roundInfo').textContent = `রাউন্ড: ${currentRound}`;
            const totalRounds = Math.ceil(teams.length / 2);
            document.getElementById('nextRoundBtn').disabled = matches.some(m => m.status !== 'completed');
        }

        // ===== ম্যাচ খেলা =====
        function startMatch(index) {
            currentMatchIndex = index;
            const match = matches[index];
            match.status = 'ongoing';
            currentGame = new ChessGame();
            currentMatchData = {
                matchIndex: index,
                player1: match.player1,
                player2: match.player2
            };
            selectedSquare = null;
            legalMoves = [];
            renderMatches();
            openBoard();
            renderBoardUI();
        }

        function resumeMatch(index) {
            currentMatchIndex = index;
            const match = matches[index];
            currentMatchData = {
                matchIndex: index,
                player1: match.player1,
                player2: match.player2
            };
            // গেম স্টেট রিস্টোর (সিম্পলিফাইড - নতুন গেম)
            if (!match.gameState) {
                currentGame = new ChessGame();
            } else {
                // রিস্টোর লজিক (এখনও ইমপ্লিমেন্ট করিনি)
                currentGame = new ChessGame();
            }
            selectedSquare = null;
            legalMoves = [];
            openBoard();
            renderBoardUI();
        }

        function openBoard() {
            document.getElementById('boardContainer').classList.add('active');
            document.getElementById('boardTitle').textContent = 
                `⚪ ${currentMatchData.player1} vs ⚫ ${currentMatchData.player2}`;
        }

        function closeBoard() {
            document.getElementById('boardContainer').classList.remove('active');
            currentGame = null;
            selectedSquare = null;
            legalMoves = [];
        }

        function renderBoardUI() {
            const boardEl = document.getElementById('chessBoard');
            boardEl.innerHTML = '';

            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const square = document.createElement('div');
                    const isLight = (r + c) % 2 === 0;
                    square.className = `chess-square ${isLight ? 'light' : 'dark'}`;
                    
                    const piece = currentGame.board[r][c];
                    if (piece) {
                        const symbol = UNICODE_PIECES[piece.color][piece.type];
                        square.textContent = symbol;
                        square.className += ` piece-${piece.color}`;
                    }

                    if (selectedSquare && selectedSquare.row === r && selectedSquare.col === c) {
                        square.classList.add('selected');
                    }

                    const isLegal = legalMoves.some(m => m.toRow === r && m.toCol === c);
                    if (isLegal) {
                        square.classList.add('legal-move');
                    }

                    square.dataset.row = r;
                    square.dataset.col = c;
                    square.addEventListener('click', () => onBoardClick(r, c));
                    boardEl.appendChild(square);
                }
            }

            // টার্ন
            document.getElementById('boardTurn').textContent = 
                currentGame.currentTurn === COLORS.WHITE ? '⚪ সাদা' : '⚫ কালো';

            // স্ট্যাটাস
            const status = document.getElementById('boardStatus');
            if (currentGame.isCheckmate(currentGame.currentTurn)) {
                status.textContent = '🏆 চেকমেট!';
                status.style.color = '#ff6b6b';
                endMatch(currentGame.currentTurn === COLORS.WHITE ? currentMatchData.player2 : currentMatchData.player1);
            } else if (currentGame.isStalemate(currentGame.currentTurn)) {
                status.textContent = '🤝 স্টেলমেট!';
                status.style.color = '#ffd93d';
                endMatch(null); // ড্র
            } else if (currentGame.isKingInCheck(currentGame.currentTurn)) {
                status.textContent = '⚠️ চেক!';
                status.style.color = '#ff6b6b';
            } else {
                status.textContent = '';
            }
        }

        function onBoardClick(row, col) {
            if (currentGame.gameOver) return;

            const piece = currentGame.board[row][col];

            if (selectedSquare === null && piece && piece.color === currentGame.currentTurn) {
                selectedSquare = { row, col };
                legalMoves = currentGame.getLegalMoves(currentGame.currentTurn)
                    .filter(m => m.fromRow === row && m.fromCol === col);
                renderBoardUI();
                return;
            }

            if (selectedSquare !== null) {
                const isLegal = legalMoves.some(m => m.toRow === row && m.toCol === col);

                if (isLegal) {
                    currentGame.makeMove({ 
                        fromRow: selectedSquare.row, 
                        fromCol: selectedSquare.col, 
                        toRow: row, 
                        toCol: col 
                    });
                    selectedSquare = null;
                    legalMoves = [];

                    // চেকমেট/স্টেলমেট চেক
                    if (currentGame.isCheckmate(currentGame.currentTurn)) {
                        const winner = currentGame.currentTurn === COLORS.WHITE ? 
                            currentMatchData.player2 : currentMatchData.player1;
                        endMatch(winner);
                    } else if (currentGame.isStalemate(currentGame.currentTurn)) {
                        endMatch(null);
                    } else {
                        renderBoardUI();
                    }
                    return;
                }

                if (piece && piece.color === currentGame.currentTurn) {
                    selectedSquare = { row, col };
                    legalMoves = currentGame.getLegalMoves(currentGame.currentTurn)
                        .filter(m => m.fromRow === row && m.fromCol === col);
                    renderBoardUI();
                    return;
                }

                selectedSquare = null;
                legalMoves = [];
                renderBoardUI();
            }
        }

        function endMatch(winner) {
            const match = matches[currentMatchIndex];
            match.status = 'completed';
            match.winner = winner;
            match.score = winner ? 
                `${winner} জিতেছে!` : 
                'ড্র';

            // পয়েন্ট আপডেট
            if (winner) {
                matchResults.push({ team: winner, points: 3 });
                const loser = winner === match.player1 ? match.player2 : match.player1;
                matchResults.push({ team: loser, points: 1 });
            } else {
                matchResults.push({ team: match.player1, points: 1 });
                matchResults.push({ team: match.player2, points: 1 });
            }

            currentGame.gameOver = true;
            renderBoardUI();
            renderMatches();
            updateRoundInfo();

            // 2 সেকেন্ড পর বোর্ড বন্ধ
            setTimeout(() => {
                closeBoard();
            }, 3000);
        }

        function resignMatch() {
            if (confirm('নিশ্চিতভাবে হার মানতে চান?')) {
                const loser = currentGame.currentTurn === COLORS.WHITE ? 
                    currentMatchData.player1 : currentMatchData.player2;
                const winner = loser === currentMatchData.player1 ? 
                    currentMatchData.player2 : currentMatchData.player1;
                endMatch(winner);
            }
        }

        // ===== পরবর্তী রাউন্ড =====
        function nextRound() {
            if (matches.some(m => m.status !== 'completed')) {
                alert('সব ম্যাচ শেষ না হলে পরবর্তী রাউন্ড যাবে না!');
                return;
            }

            // সব টিমের পয়েন্ট ক্যালকুলেট
            const points = {};
            teams.forEach(t => points[t] = 0);
            matchResults.forEach(r => {
                points[r.team] = (points[r.team] || 0) + r.points;
            });

            // পয়েন্ট অনুযায়ী সাজানো
            const sorted = teams.sort((a, b) => (points[b] || 0) - (points[a] || 0));
            
            // ফাইনাল রাউন্ড চেক
            if (currentRound >= Math.ceil(teams.length / 2)) {
                alert(`🏆 টুর্নামেন্ট শেষ! চ্যাম্পিয়ন: ${sorted[0]}`);
                return;
            }

            currentRound++;
            generateRound();
        }

        function endTournament() {
            if (confirm('টুর্নামেন্ট শেষ করতে চান?')) {
                const points = {};
                teams.forEach(t => points[t] = 0);
                matchResults.forEach(r => {
                    points[r.team] = (points[r.team] || 0) + r.points;
                });
                const sorted = teams.sort((a, b) => (points[b] || 0) - (points[a] || 0));
                alert(`🏆 টুর্নামেন্ট শেষ!\n\n🥇 চ্যাম্পিয়ন: ${sorted[0]}\n🥈 রানার-আপ: ${sorted[1] || '-'}\n\nপয়েন্ট তালিকা:\n${sorted.map((t, i) => `${i+1}. ${t} - ${points[t]} পয়েন্ট`).join('\n')}`);
                document.getElementById('tournamentSection').classList.remove('active');
                document.getElementById('setupSection').style.display = 'block';
                tournamentStarted = false;
                resetAll();
            }
        }

        function showStandings() {
            const points = {};
            teams.forEach(t => points[t] = 0);
            matchResults.forEach(r => {
                points[r.team] = (points[r.team] || 0) + r.points;
            });
            const sorted = teams.sort((a, b) => (points[b] || 0) - (points[a] || 0));
            alert(`📊 পয়েন্ট তালিকা:\n\n${sorted.map((t, i) => `${i+1}. ${t} - ${points[t]} পয়েন্ট`).join('\n')}`);
        }

        // ===== কিবোর্ড শর্টকাট =====
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeBoard();
        });

        // Enter কী দিয়ে টিম যোগ
        document.getElementById('teamNameInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addTeam();
        });

        // ===== ইনিশিয়ালাইজ =====
        renderTeams();
        updateStartButton();

        console.log('♟️ চেস টুর্নামেন্ট সিস্টেম লোড হয়েছে!');
        console.log(`📌 ${teams.length} টি টিম প্রস্তুত`);
    </script>
</body>
</html>
